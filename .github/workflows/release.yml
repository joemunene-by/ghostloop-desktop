name: Release

# MANUAL TRIGGER ONLY. The Tauri bundle pipeline has two known issues
# that need an architectural fix before it produces working artefacts:
#
#   1. tauri.conf.json beforeBuildCommand backgrounds `npm run start`
#      with `&`, which never exits. tauri-action waits on the shell
#      and hangs indefinitely (jobs ran 70+ min before being killed).
#
#   2. frontendDist points at .next/static (JS chunks only). For a
#      self-contained desktop bundle the UI needs `output: 'export'`
#      in next.config.ts and frontendDist pointed at the resulting
#      out/ directory. The /api/backend/[...path] proxy can't run in
#      static-export mode, so the desktop variant has to talk to the
#      sidecar Python runtime on localhost:8000 directly.
#
# Tag pushes used to trigger this workflow automatically; auto-trigger
# is disabled until the above is sorted (tracked for v0.2.1 / v0.3).
# Use workflow_dispatch from the Actions tab once the conf is fixed.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout desktop
        uses: actions/checkout@v4
        with:
          path: ghostloop-desktop

      - name: Checkout ui sibling
        uses: actions/checkout@v4
        with:
          repository: joemunene-by/ghostloop-ui
          path: ghostloop-ui
          ref: main

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux Tauri prerequisites
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libudev-dev \
            libasound2-dev

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ghostloop-desktop/src-tauri

      - name: Build the UI
        working-directory: ghostloop-ui
        run: |
          npm install
          npm run build

      - name: Install desktop deps
        working-directory: ghostloop-desktop
        run: npm install

      - name: Tauri build
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: ghostloop-desktop
          tagName: ${{ github.ref_name }}
          releaseName: "ghostloop-desktop ${{ github.ref_name }}"
          releaseBody: |
            See [CHANGELOG.md](https://github.com/joemunene-by/ghostloop-desktop/blob/main/CHANGELOG.md).
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
