name: Release

# Tag-push only. Builds the desktop bundles on each OS and uploads
# them as a GitHub release. The ghostloop-ui frontend repo is cloned
# alongside this checkout because tauri.conf.json points at
# ../ghostloop-ui/.next/static. Tag format: v0.2.0.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout desktop
        uses: actions/checkout@v4
        with:
          path: ghostloop-desktop

      - name: Checkout ui sibling
        uses: actions/checkout@v4
        with:
          repository: joemunene-by/ghostloop-ui
          path: ghostloop-ui
          ref: main

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux Tauri prerequisites
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libudev-dev \
            libasound2-dev

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ghostloop-desktop/src-tauri

      - name: Build the UI
        working-directory: ghostloop-ui
        run: |
          npm install
          npm run build

      - name: Install desktop deps
        working-directory: ghostloop-desktop
        run: npm ci

      - name: Tauri build
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: ghostloop-desktop
          tagName: ${{ github.ref_name }}
          releaseName: "ghostloop-desktop ${{ github.ref_name }}"
          releaseBody: |
            See [CHANGELOG.md](https://github.com/joemunene-by/ghostloop-desktop/blob/main/CHANGELOG.md).
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
